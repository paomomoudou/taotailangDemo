<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>淘太郎官网轮播图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 50px auto;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .banner-slide {
            display: flex;
            transition: transform 0.5s ease;
        }
        .banner-item {
            min-width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
        }
        .banner-controls {
            text-align: center;
            margin-top: 20px;
        }
        .banner-controls button {
            padding: 8px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            background: #42b983;
            color: white;
            cursor: pointer;
        }
        .banner-controls button:hover {
            background: #359469;
        }
    </style>
</head>
<body>
<div class="banner-container">
    <div class="banner-slide" id="bannerSlide"></div>
</div>
<div class="banner-controls">
    <button onclick="prevSlide()">上一张</button>
    <button onclick="nextSlide()">下一张</button>
</div>

<script>
    let currentIndex = 0;
    let banners = [];

    // 从后端接口获取轮播图数据
    fetch('/api/banner/list')
        .then(res => res.json())
        .then(data => {
            banners = data; // 适配你的接口返回结构
            renderBanners();
        })
        .catch(err => {
            console.error('获取轮播图失败:', err);
            document.body.innerHTML = '<h2>加载轮播图失败，请检查接口</h2>';
        });

    // 渲染轮播图
    function renderBanners() {
        const slide = document.getElementById('bannerSlide');
        slide.innerHTML = banners.map(item => `
                <div class="banner-item" style="background-image: url('${item.imgUrl}')"></div>
            `).join('');
    }

    // 上一张
    function prevSlide() {
        currentIndex = (currentIndex - 1 + banners.length) % banners.length;
        document.getElementById('bannerSlide').style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // 下一张
    function nextSlide() {
        currentIndex = (currentIndex + 1) % banners.length;
        document.getElementById('bannerSlide').style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // 自动轮播
    setInterval(nextSlide, 3000);
</script>
</body>
</html>
