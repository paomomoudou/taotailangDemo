<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄桃太郎日本语</title>
    <link rel="icon" href="pic/logo.png">
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <style>
        /* 面包屑导航 */
        
        .breadcrumb {
            width: 90%;
            margin: 20px auto;
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #666;
        }
        
        .breadcrumb a:hover {
            color: #EF89A0;
        }
        
        .breadcrumb span {
            margin: 0 5px;
        }
        /* 详情内容 */
        
        .detail-wrapper {
            width: 80%;
            margin: 30px auto;
            background-color: #FCE4E7;
            padding: 30px;
        }
        
        .detail-title {
            font-size: 26px;
            color: #333;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .detail-date {
            text-align: center;
            color: #999;
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        .detail-img {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .detail-img img {
            border-radius: 8px;
            margin: 0 auto;
            height: 350px;
        }
        
        .detail-content {
            font-size: 20px;
            line-height: 1.9;
            text-align: justify;
        }
        #detailContent p {
            text-indent: 2em;   /* 每段都缩进 */
            line-height: 1.8;
        }
        /* 手机端 */
        
        @media (max-width: 992px) {
            .tel {
                display: block;
            }
            .nav-list {
                display: none;
                flex-direction: column;
            }
            .nav-list>li {
                padding: 14px 5%;
            }
            .submenu {
                position: static;
                width: 100%;
                min-width: 100px !important;
            }
            .hamburger {
                display: block;
            }
            #menu-toggle:checked+.nav-list {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <!-- 引用导航 -->
    <div id="nav-box"></div>
    <script>
        $(function() {
            $("#nav-box").load("nav.html", function() {
                // 导航加载完成后，自动设置当前页高亮
                var page = "news";
                $("[data-page='" + page + "']").addClass("active");
            });
        });
    </script>
    <div class="content">
        <div class="detail">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <a href="index.html">首页</a><span>&gt;</span>
                <span>活动资讯</span><span>&gt;</span>
                <a href="news.html">最新消息</a><span>&gt;</span>
                <span id="newsTitle"></span>
            </div>

            <div class="detail-wrapper">
                <h1 class="detail-title" id="detailTitle"></h1>
                <div class="detail-date" id="detailTime"></div>
                <div class="detail-img">
                    <img id="detailImg">
                </div>
                <div class="detail-content" id="detailContent">
                </div>
            </div>
        </div>
    </div>

    <!-- 引用底部 -->
    <div id="footer-box"></div>
    <script>
        $("#footer-box").load("footer.html");
    </script>
    <!-- 引入右下角飘窗 -->
    <div id="float-container"></div>
    <script>
        // 使用 fetch 引入公共文件
        fetch('float.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('float-container').innerHTML = data;
            });
    </script>
    <script>
        $(function () {
            // 从地址栏拿到 id
            let id = new URLSearchParams(location.search).get("id");
            if (!id) {
                alert("参数错误");
                return;
            }
            // 根据 id 获取单条详情
            $.get("/api/message/detail/" + id, function (res) {
                if (res.code !== 200) return;
                let item = res.data;
                // 渲染到页面
                $("#detailTitle").text(item.title);
                $("#newsTitle").text(item.title);
                $("#detailTime").text(item.publishTime);
                $("#detailImg").attr("src", item.imgUrl);
                // 关键：自动分段 + 每段都缩进
                let arr = item.content.split(/\n+/).filter(t => t.trim());
                let contentHtml = "";
                arr.forEach(text => {
                    contentHtml += `<p>${text}</p>`;
                });
                $("#detailContent").html(contentHtml);
            });
        });
    </script>
</body>

</html>
