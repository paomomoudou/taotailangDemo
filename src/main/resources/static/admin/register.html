<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>桃太郎后台管理系统</title>
    <link rel="icon" href="img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #EB7E98;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #EB7A80;
        }
        .msg {
            text-align: center;
            margin-top: 20px;
            color: #ff4d4f;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>用户注册</h2>
    <div class="input-group">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="请输入11位手机号">
    </div>
    <div class="input-group">
        <label>设置密码</label>
        <input type="password" id="password" placeholder="请输入至少6位密码">
    </div>
    <div class="input-group">
        <label>确认密码</label>
        <input type="password" id="repassword" placeholder="请再次输入密码">
    </div>
    <div class="input-group">
        <label>昵称</label>
        <input type="text" id="nickname" placeholder="请输入昵称">
    </div>
    <button class="btn" onclick="register()">立即注册</button>
    <div class="msg" id="msg"></div>
    <div class="link">
        已有账号？<a href="/admin/login.html">去登录</a>
    </div>
</div>

<script>
    function register() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const repassword = document.getElementById('repassword').value;
        const nickname = document.getElementById('nickname').value;
        const msg = document.getElementById('msg');

        // 简单校验
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            msg.textContent = "请输入正确的手机号";
            msg.style.color = "#ff4d4f";
            return;
        }
        if (password.length < 6) {
            msg.textContent = "密码长度不能少于6位";
            msg.style.color = "#ff4d4f";
            return;
        }
        if (password !== repassword) {
            msg.textContent = "两次密码输入不一致";
            msg.style.color = "#ff4d4f";
            return;
        }
        if (!nickname) {
            msg.textContent = "请输入昵称";
            msg.style.color = "#ff4d4f";
            return;
        }

        // 调用注册接口
        fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password, nickname })
        })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    msg.textContent = "注册成功，3秒后跳转登录...";
                    msg.style.color = "#52c41a";
                    setTimeout(() => window.location.href = "/admin/login.html", 3000);
                } else {
                    msg.textContent = data.msg;
                    msg.style.color = "#ff4d4f";
                }
            })
            .catch(err => {
                msg.textContent = "网络错误，请重试";
                msg.style.color = "#ff4d4f";
            });
    }
</script>
</body>
</html>
