<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面加载失败</title>
  <style>
    /* 保持与主页面样式统一 */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Microsoft Yahei",sans-serif;}
    .error-card{
      background:#fff;padding:30px;border-radius:8px;
      box-shadow:0 2px 12px rgba(0,0,0,.08);
      max-width:600px;margin:0 auto;
      margin-top:50px;
    }
    .error-card h2{
      color:#f5222d;font-size:24px;margin-bottom:20px;
      display:flex;align-items:center;gap:10px;
    }
    .error-card p{
      color:#666;line-height:1.8;font-size:16px;
      margin-bottom:15px;
    }
    .error-card .btn-refresh{
      background:#EB7E98;color:#fff;border:none;
      padding:10px 20px;border-radius:4px;
      font-size:14px;cursor:pointer;
      transition:background 0.3s;
    }
    .error-card .btn-refresh:hover{
      background:#e86588;
    }
  </style>
</head>
<body>
<div class="error-card">
  <h2>❌ 页面加载失败</h2>
  <p>抱歉，目标页面无法正常加载，请检查以下内容：</p>
  <p>1. 页面文件是否存在</p>
  <p>2. 页面路径是否正确</p>
  <p>3. 网络连接是否正常</p>
  <button class="btn-refresh" onclick="window.location.reload()">刷新重试</button>
</div>
</body>
</html>
