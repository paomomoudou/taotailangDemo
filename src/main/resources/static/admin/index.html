<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理系统</title>
  <link rel="icon" href="img/logo.png">
  <style>
    /* 全局样式重置 */
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:"Microsoft Yahei",sans-serif;}
    a{text-decoration:none;color:inherit;}
    input{outline:none;border:1px solid #ddd;}
    button{border:none;cursor:pointer;}

    /* 整体布局 - flex垂直布局，撑满屏幕 */
    body{display: flex;flex-direction: column;overflow:hidden;}

    /* 顶部导航栏 */
    .top-header{
      height:60px;background:#EB7E98;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;position:relative;z-index:10;
    }
    .logo{font-size:20px;font-weight:bold;}
    .user-wrap{position:relative;cursor:pointer;display:flex;align-items:center;}

    /* 用户下拉菜单 */
    .user-menu{
      position:absolute;right:0;top:60px;background:#fff;color:#333;
      width:180px;border:1px solid #eee;box-shadow:0 2px 12px rgba(0,0,0,.1);
      display:none;z-index:9999;
    }
    .user-menu div{padding:12px 16px;border-bottom:1px solid #f5f5f5;}
    .user-menu div:hover{background:#f5fafe;color:#EB7E98;}

    /* 主体布局 - flex水平布局，占满剩余高度 */
    .main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 60px);}

    /* 左侧侧边栏 */
    .sidebar{
      width:220px;background:#304156;color:#fff;
      padding:15px;overflow-y:auto;
    }
    .sidebar ul{list-style:none;}
    .sidebar li{
      height:50px;line-height:50px;padding-left:20px;
      cursor:pointer;border-radius:4px;margin-bottom:5px;
    }
    .sidebar li.active{background:#EB7E98;}
    .sidebar li:hover{background:#263445;}

    /* 右侧内容区域 */
    .content{
      flex:1;background:#f5f5f5;padding:20px;overflow-y:auto;
    }
    .card{
      background:#fff;padding:24px;border-radius:4px;
      box-shadow:0 2px 12px rgba(0,0,0,.08);
    }
    .card h2{margin-bottom:20px;color:#333;}
    .card p{color:#666;line-height:1.6;}

    /* 自定义弹窗遮罩 - 核心：flex居中，层级拉满，撑满屏幕 */
    .mask{
      position:fixed;top:0;left:0;width:100vw;height:100vh;
      background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;
      z-index:99999;cursor:pointer;
    }

    /* 弹窗主体 */
    .modal{
      width:420px;background:#fff;padding:24px;border-radius:8px;
      cursor:default;box-shadow:0 4px 20px rgba(0,0,0,.2);
      position:relative;
    }
    .modal h3{margin-bottom:16px;color:#333;font-size:18px;}
    .modal-item{margin-bottom:14px;}
    .modal-item label{
      display:block;margin-bottom:6px;color:#666;
      font-size:14px;
    }
    .modal-item input{
      width:100%;padding:10px;border-radius:4px;
      font-size:14px;
    }
    /* 输入框聚焦样式 */
    .modal-item input:focus{
      border-color:#EB7E98;box-shadow:0 0 0 2px rgba(235,126,152,.2);
    }

    /* 弹窗按钮组 */
    .modal-btns{text-align:right;margin-top:20px;}
    .modal-btns button{
      padding:8px 16px;margin-left:10px;border-radius:4px;
      font-size:14px;
    }
    .btn-sure{background:#EB7E98;color:#fff;}
    .btn-sure:hover{background:#e86588;}
    .btn-cancel{background:#eee;color:#666;}
    .btn-cancel:hover{background:#e5e5e5;}
  </style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-header">
  <div class="logo">桃太郎后台管理</div>
  <div class="user-wrap" id="userWrap">
    <span id="topNick">欢迎</span> ▾
    <div class="user-menu" id="userMenu">
      <div onclick="openEditNick()">修改昵称</div>
      <div onclick="openEditPwd()">修改密码</div>
      <div onclick="openEditPhone()">修改手机号</div>
      <div onclick="openEditAvatar()">修改头像</div>
      <div onclick="logout()">退出登录</div>
    </div>
  </div>
</div>

<!-- 主体布局 -->
<div class="main">
  <div class="sidebar">
    <ul>
      <li onclick="loadPage('home.html',this)" id="nav-home">首页</li>
      <li onclick="loadPage('banner.html',this)">轮播图</li>
      <li onclick="loadPage('message.html',this)">消息管理</li>
      <li onclick="loadPage('diary.html',this)">日记管理</li>
    </ul>
  </div>
  <!-- 右侧内容区域（局部加载页面） -->
  <div class="content" id="content">

  </div>
</div>

<!-- 修改昵称弹窗 -->
<div class="mask" id="maskNick" onclick="closeAllMask()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>修改昵称</h3>
    <div class="modal-item">
      <label>新昵称</label>
      <input type="text" id="newNick">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAllMask()">取消</button>
      <button class="btn-sure" onclick="submitNick()">确定</button>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="mask" id="maskPwd" onclick="closeAllMask()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>修改密码</h3>
    <div class="modal-item"><label>原密码</label><input type="password" id="oldPwd"></div>
    <div class="modal-item"><label>新密码(≥6位)</label><input type="password" id="newPwd"></div>
    <div class="modal-item"><label>确认新密码</label><input type="password" id="reNewPwd"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAllMask()">取消</button>
      <button class="btn-sure" onclick="submitPwd()">确定</button>
    </div>
  </div>
</div>

<!-- 修改手机号弹窗 -->
<div class="mask" id="maskPhone" onclick="closeAllMask()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>修改手机号</h3>
    <div class="modal-item"><label>新手机号</label><input type="text" id="newPhone"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAllMask()">取消</button>
      <button class="btn-sure" onclick="submitPhone()">确定</button>
    </div>
  </div>
</div>

<!-- 修改头像弹窗（简易文本提示） -->
<div class="mask" id="maskAvatar" onclick="closeAllMask()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>修改头像</h3>
    <p style="color:#666;margin:10px 0;padding:10px;background:#f5f5f5;border-radius:4px;font-size:14px;">
      当前简易版：后端预留头像字段后即可上传图片
    </p>
    <div class="modal-btns">
      <button class="btn-sure" onclick="closeAllMask()">知道了</button>
    </div>
  </div>
</div>

<!-- 仅保留jQuery（用于页面局部加载，无其他依赖） -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script>
  // 登录用户信息校验
  let loginUser = JSON.parse(localStorage.getItem("loginUser") || "{}");
  if (!loginUser.id) { location.href = "/login.html"; }
  // ********** 新增：全局变量声明（供所有局部页面复用） **********
  let currentPage = 1; // 轮播图分页当前页
  let pageSize = 10; // 轮播图分页条数
  let currentOperId = null; // 操作对象ID（轮播图状态修改/删除用）
  let targetStatus = null; // 目标状态（轮播图启用/禁用用）

  let messageCurrentPage = 1; // 消息管理当前页
  let messagePageSize = 10; // 消息管理分页条数（每页10条）
  let imgUrl = "";

  let diaryPageSize = 10; // 日记管理分页条数（每页10条）
  let diaryCurrentPage = 1; // 日记管理当前页
  let currentDiaryId = null; // 当前操作的日记ID
  let mediaUrl = "";
  let mediaType = "";

  // 右上角显示昵称/手机号
  document.getElementById("topNick").innerText = "欢迎：" + (loginUser.nickname || loginUser.phone);

  // ********** 顶部用户下拉菜单 **********
  document.getElementById("userWrap").addEventListener("click", e => {
    e.stopPropagation();
    const menu = document.getElementById("userMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  });
  // 点击空白处关闭下拉菜单
  document.addEventListener("click", () => {
    document.getElementById("userMenu").style.display = "none";
  });

  // ********** 退出登录 **********
  function logout() {
    if (confirm("确定退出？")) {
      localStorage.removeItem("loginUser");
      location.href = "/admin/login.html";
    }
  }

  // ********** 弹窗核心方法 **********
  // 关闭所有弹窗并清空输入框
  function closeAllMask() {
    document.querySelectorAll(".mask").forEach(m => {
      m.style.display = "none";
      m.querySelectorAll("input").forEach(i => i.value = "");
    });
  }
  // 打开修改昵称弹窗
  function openEditNick() {
    closeAllMask();
    document.getElementById("maskNick").style.display = "flex";
    setTimeout(() => document.getElementById("newNick").focus(), 100);
  }
  // 打开修改密码弹窗
  function openEditPwd() {
    closeAllMask();
    document.getElementById("maskPwd").style.display = "flex";
    setTimeout(() => document.getElementById("oldPwd").focus(), 100);
  }
  // 打开修改手机号弹窗
  function openEditPhone() {
    closeAllMask();
    document.getElementById("maskPhone").style.display = "flex";
    setTimeout(() => document.getElementById("newPhone").focus(), 100);
  }
  // 打开修改头像弹窗
  function openEditAvatar() {
    closeAllMask();
    document.getElementById("maskAvatar").style.display = "flex";
  }

  // ********** 提交修改操作 **********
  // 提交修改昵称
  function submitNick() {
    const nickname = document.getElementById("newNick").value.trim();
    if (!nickname) {
      alert("请输入昵称");
      document.getElementById("newNick").focus();
      return;
    }
    fetch("/api/user/updateNickname", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: loginUser.id, nickname: nickname })
    })
            .then(res => res.json())
            .then(d => {
              if (d.code === 200) {
                alert("修改成功");
                loginUser.nickname = nickname;
                localStorage.setItem("loginUser", JSON.stringify(loginUser));
                document.getElementById("topNick").innerText = "欢迎：" + nickname;
                closeAllMask();
              } else { alert(d.msg || "修改失败"); }
            })
            .catch(err => { alert("网络错误，请重试"); console.log(err); });
  }

  // 提交修改密码
  function submitPwd() {
    const oldPwd = document.getElementById("oldPwd").value;
    const newPwd = document.getElementById("newPwd").value;
    const reNew = document.getElementById("reNewPwd").value;
    // 表单校验
    if (!oldPwd) { alert("请输入原密码"); document.getElementById("oldPwd").focus(); return; }
    if (newPwd.length < 6) { alert("新密码不能少于6位"); document.getElementById("newPwd").focus(); return; }
    if (newPwd !== reNew) { alert("两次新密码不一致"); document.getElementById("reNewPwd").focus(); return; }
    // 提交请求
    fetch("/api/user/updatePwd", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: loginUser.id, oldPwd, newPwd })
    })
            .then(res => res.json())
            .then(d => {
              if (d.code === 200) {
                alert("密码修改成功，请重新登录");
                logout();
              } else { alert(d.msg || "密码修改失败"); }
            })
            .catch(err => { alert("网络错误，请重试"); console.log(err); });
  }

  // 提交修改手机号
  function submitPhone() {
    const phone = document.getElementById("newPhone").value.trim();
    // 手机号正则校验
    if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
      alert("请输入有效的手机号");
      document.getElementById("newPhone").focus();
      return;
    }
    // 提交请求
    fetch("/api/user/updatePhone", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: loginUser.id, newPhone: phone })
    })
            .then(res => res.json())
            .then(d => {
              if (d.code === 200) {
                alert("手机号修改成功");
                loginUser.phone = phone;
                localStorage.setItem("loginUser", JSON.stringify(loginUser));
                closeAllMask();
              } else { alert(d.msg || "手机号修改失败"); }
            })
            .catch(err => { alert("网络错误，请重试"); console.log(err); });
  }

  // ********** 局部加载页面（统一处理所有页面） **********
  function loadPage(target, elem) {
    // 加载前关闭所有弹窗和下拉菜单
    closeAllMask();
    document.getElementById("userMenu").style.display = "none";

    // 重置导航激活状态
    document.querySelectorAll(".sidebar li").forEach(li => li.classList.remove("active"));
    elem.classList.add("active");

    // 统一加载逻辑（所有页面共用）
    $("#content").load(target, function(response, status, xhr) {
      // 所有页面加载失败时，统一加载独立错误页面
      if (status === "error") {
        const errorMsg = encodeURIComponent(`无法加载页面：${target}（错误：${xhr.statusText}）`);
        $("#content").load(`error.html?msg=${errorMsg}`);
      } else {
        // 仅轮播图页面：主动触发列表加载（解决二次切换不显示问题）
        if (target === "banner.html" && typeof window.loadBannerList === "function") {
          window.loadBannerList();
        }
      }
    });
  }

  // 页面初始化加载列表
  $(function () {
    // 获取首页导航元素
    const homeNav = document.getElementById("nav-home");
    // 调用加载方法，传入home.html和首页导航元素
    loadPage("home.html", homeNav);
  });

</script>
</body>
</html>
