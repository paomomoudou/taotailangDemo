<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>桃太郎后台管理系统</title>
    <link rel="icon" href="img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background: #5568d3;
        }
        .register-btn{
            width: 100%;
            padding: 12px;
            margin-top:12px;
            background: #EB7E98;
            color: #fff;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }
        .register-btn:hover{
            background:#EB7A80;
        }
        .msg {
            text-align: center;
            margin-top: 20px;
            color: #ff4d4f;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>管理员登录</h2>
    <div class="input-group">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="请输入手机号">
    </div>
    <div class="input-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="login-btn" onclick="login()">登录</button>
    <!-- 新增注册按钮 -->
    <button class="register-btn" onclick="goRegister()">去注册</button>
    <div class="msg" id="msg"></div>
</div>

<script>
    function login() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        if (!phone || !password) {
            msg.textContent = '请输入用户名和密码';
            return;
        }

        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
        })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    // 存用户信息到本地存储
                    localStorage.setItem("loginUser", JSON.stringify(data.data));
                    msg.textContent = '登录成功，正在跳转...';
                    msg.style.color = '#52c41a';
                    // 登录成功后跳转到首页
                    setTimeout(() => window.location.href = '/admin/index.html', 1000);
                } else {
                    msg.textContent = data.msg;
                    msg.style.color = '#ff4d4f';
                }
            })
            .catch(err => {
                msg.textContent = '网络错误，请稍后再试';
                msg.style.color = '#ff4d4f';
            });
    }
    // 跳转到注册页
    function goRegister(){
        window.location.href = "/admin/register.html";
    }
</script>
</body>
</html>
