<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄桃太郎日本语</title>
    <link rel="icon" href="pic/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 面包屑导航 */
        
        .breadcrumb {
            width: 90%;
            margin: 20px auto;
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #666;
        }
        
        .breadcrumb a:hover {
            color: #EF89A0;
        }
        
        .breadcrumb span {
            margin: 0 5px;
        }
        /* 课程特色主体 */
        
        .feature {
            width: 90%;
            margin: 0 auto 40px;
        }
        
        .feature h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin: 30px auto 40px;
            color: #2c3e50;
            border-left: 4px solid #EF89A0;
            padding-left: 10px;
        }
        /* 每行特色项 */
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 35px;
            padding-bottom: 35px;
            border-bottom: 1px solid #eee;
        }
        
        .feature-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        /* 左侧图片 */
        
        .feature-img {
            width: 220px;
            height: 160px;
            flex-shrink: 0;
        }
        
        .feature-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        /* 右侧文字区域 */
        
        .feature-content {
            flex: 1;
        }
        /* 标题 + 两侧桃子图标 */
        
        .feature-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .peach-icon {
            width: 25px;
            height: 25px;
            object-fit: contain;
        }
        
        .feature-title h3 {
            font-size: 26px;
            font-weight: bold;
        }
        /* 介绍文字 */
        
        .feature-desc {
            font-size: 20px;
            line-height: 1.8;
        }
        /* 底部 */
        
        footer {
            background: #EF89A0;
            color: #fff;
            text-align: center;
            padding: 25px 0;
            margin-top: auto;
        }
        /* 手机端 */
        
        @media (max-width: 992px) {
            .tel {
                display: block;
            }
            .nav-list {
                display: none;
                flex-direction: column;
            }
            .nav-list>li {
                padding: 14px 5%;
            }
            .submenu {
                position: static;
                width: 100%;
                min-width: 100px !important;
            }
            .hamburger {
                display: block;
            }
            #menu-toggle:checked+.nav-list {
                display: flex;
            }
            .feature-item {
                flex-direction: column;
                text-align: center;
            }
            .feature-img {
                width: 100%;
                height: auto;
            }
            .feature-title {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <!-- 引用导航 -->
    <div id="nav-box"></div>
    <script>
        $(function() {
            $("#nav-box").load("nav.html");
        });
    </script>

    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="index.html">首页</a><span>&gt;</span>
        <span>多模式授课</span>
    </div>
    <!-- 多模式授课主体内容 -->
    <div class="content">
        <section class="feature">
            <h2>💻 多模式授课 💻</h2>
            <div>
                <h3 class="section-title">线下授课</h3>
                <!-- 第1行 -->
                <div class="feature-item">
                    <div class="feature-img">
                        <img src="pic/multi1.jpg" alt="趣味课堂">
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                            <h3>小班精品课</h3>
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                        </div>
                        <div class="feature-desc">
                            1对1、1对2或3-5人小组课，保障老师能充分关注每位学生的学习状态。
                        </div>
                    </div>
                </div>

                <!-- 第2行 -->
                <div class="feature-item">
                    <div class="feature-img">
                        <img src="pic/multi2.jpg" alt="精品小班">
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                            <h3>大班互动课</h3>
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                        </div>
                        <div class="feature-desc">
                            适合基础入门或兴趣类学习，课堂氛围活跃，性价比高。
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="section-title">线上授课</h3>

                <!-- 第3行 -->
                <div class="feature-item">
                    <div class="feature-img">
                        <img src="pic/multi3.jpg" alt="多元班">
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                            <h3>直播课</h3>
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                        </div>
                        <div class="feature-desc">
                            实时互动，支持1对1、1对2、1对多等形式，打破地域限制。
                        </div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-img">
                        <img src="pic/multi4.jpg" alt="多元班">
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                            <h3>录播课</h3>
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                        </div>
                        <div class="feature-desc">
                            可反复观看，灵活安排学习时间，适合碎片化学习或复习巩固。
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <h3 class="section-title">混合模式</h3>
                <div class="feature-item">
                    <div class="feature-img">
                        <img src="pic/multi5.jpg" alt="多元班">
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                            <h3>自由选择</h3>
                            <img src="pic/momo.png" alt="桃子" class="peach-icon">
                        </div>
                        <div class="feature-desc">
                            支持线上线下结合，满足学生在不同场景下的学习需求，兼顾便利性与学习效果。
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 引用底部 -->
    <div id="footer-box"></div>
    <script>
        $("#footer-box").load("footer.html");
    </script>
    <!-- 引入右下角飘窗 -->
    <div id="float-container"></div>
    <script>
        // 使用 fetch 引入公共文件
        fetch('float.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('float-container').innerHTML = data;
            });
    </script>
</body>

</html>
