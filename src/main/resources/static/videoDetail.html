<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄桃太郎日本语</title>
    <link rel="icon" href="pic/logo.png">
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <style>
        /* 面包屑导航 */
        
        .breadcrumb {
            width: 90%;
            margin: 20px auto;
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #666;
        }
        
        .breadcrumb a:hover {
            color: #EF89A0;
        }
        
        .breadcrumb span {
            margin: 0 5px;
        }
        
        video {
            width: 100%;
            max-width: 800px;
            height: 500px;
            /* 这里控制高度，你自己改数字就行 */
            object-fit: cover;
            display: block;
            margin: 20px auto;
        }
        
        .video-box {
            margin-bottom: 30px;
        }
        
        .video-box img {
            width: 90%;
            max-width: 800px;
            display: block;
            margin: 20px auto;
        }
        
        .video-box video {
            width: 90%;
            max-width: 800px;
            display: block;
            margin: 20px auto;
        }
        
        .video-title {
            font-size: 22px;
            text-align: center;
            margin: 20px 0;
        }
        
        .time {
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        /* 手机端自动变1列 */
        
        @media (max-width: 768px) {
            .tel {
                display: block;
            }
            .nav-list {
                display: none;
                flex-direction: column;
            }
            .nav-list>li {
                padding: 14px 5%;
            }
            .submenu {
                position: static;
                width: 100%;
                min-width: 100px !important;
            }
            .hamburger {
                display: block;
            }
            #menu-toggle:checked+.nav-list {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <!-- 引用导航 -->
    <div id="nav-box"></div>
    <script>
        $(function() {
            $("#nav-box").load("nav.html", function() {
                // 导航加载完成后，自动设置当前页高亮
                var page = "videoDiary";
                $("[data-page='" + page + "']").addClass("active");
            });
        });
    </script>
    <div class="content">
        <div class="video-box">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <a href="index.html">首页</a><span>&gt;</span>
                <a href="videoDiary.html">视频日记</a><span>&gt;</span>
                <span id="diaryTitle"></span>
            </div>
            <div class="video-title" id="detailTitle"></div>
            <div class="time" id="detailTime"></div>
            <div id="detailDiary"></div>
        </div>
    </div>
    <!-- 引用底部 -->
    <div id="footer-box"></div>
    <script>
        $("#footer-box").load("footer.html");
    </script>
    <!-- 引入右下角飘窗 -->
    <div id="float-container"></div>
    <script>
        // 使用 fetch 引入公共文件
        fetch('float.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('float-container').innerHTML = data;
            });
    </script>
    <script>
        $(function () {
            // 从地址栏拿到 id
            let id = new URLSearchParams(location.search).get("id");
            if (!id) {
                alert("参数错误");
                return;
            }
            // 根据 id 获取单条详情
            $.get("/api/diary/detail/" + id, function (res) {
                if (res.code !== 200) return;
                let item = res.data;
                let html = "";
                // 渲染到页面
                $("#detailTitle").text(item.title);
                $("#diaryTitle").text(item.title);
                $("#detailTime").text(item.publishTime);
                if(item.mediaType === "video"){
                    html = `<video controls src="${item.mediaUrl}"></video>`;
                    $("#detailDiary").html(html);
                }else {
                    html = `<img src="${item.mediaUrl}">`;
                    $("#detailDiary").html(html);
                }
            });
        });
    </script>

</body>

</html>
