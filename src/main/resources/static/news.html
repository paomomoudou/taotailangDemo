<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄桃太郎日本语</title>
    <link rel="icon" href="/pic/logo.png">
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <style>
        /* 面包屑导航 */
        
        .breadcrumb {
            width: 90%;
            margin: 20px auto;
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #666;
        }
        
        .breadcrumb a:hover {
            color: #EF89A0;
        }
        
        .breadcrumb span {
            margin: 0 5px;
        }
        /* 最新消息标题（带表情） */
        
        .news-title {
            width: 80%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .news-title h2 {
            font-size: 26px;
            color: #EF89A0;
        }
        
        .emoji-list {
            display: flex;
            gap: 8px;
        }
        
        .emoji {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        /* 消息列表 */
        
        .news-list {
            width: 80%;
            margin: 0 auto 40px;
        }
        
        .news-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid #f0d8e0;
            background-color: #fdf0f4;
            border-radius: 12px;
        }
        
        .news-item:last-child {
            border-bottom: none;
        }
        /* 左侧消息图片 */
        
        .news-img {
            width: 180px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .news-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右侧消息内容 */
        
        .news-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            /* 鼠标悬浮变小手 */
        }
        
        .news-content h3 {
            font-size: 26px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .news-content h3 a:hover {
            color: #EF89A0;
        }
        
        .news-desc {
            font-size: 20px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .news-desc a:hover {
            color: #EF89A0;
        }
        
        .news-date {
            font-size: 13px;
            color: #999;
        }
        /* 手机端 */
        
        @media (max-width: 992px) {
            .tel {
                display: block;
            }
            .nav-list {
                display: none;
                flex-direction: column;
            }
            .nav-list>li {
                padding: 14px 5%;
            }
            .submenu {
                position: static;
                width: 100%;
                min-width: 100px !important;
            }
            .hamburger {
                display: block;
            }
            #menu-toggle:checked+.nav-list {
                display: flex;
            }
            .news-title {
                flex-wrap: wrap;
            }
            .news-item {
                flex-direction: column;
            }
            .news-img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <!-- 引用导航 -->
    <div id="nav-box"></div>
    <script>
        $(function() {
            $("#nav-box").load("nav.html", function() {
                // 导航加载完成后，自动设置当前页高亮
                var path = window.location.pathname;
                var page = path.split("/").pop().replace(".html", ""); // 拿到当前页面名（如 about）
                $("[data-page='" + page + "']").addClass("active");
            });
        });
    </script>
    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="index.html">首页</a><span>&gt;</span>
        <span>活动资讯</span><span>&gt;</span>
        <span>最新消息</span>
    </div>

    <!-- 最新消息主体内容 -->
    <div class="content">
        <!-- 标题 + 4个表情 -->
        <div class="news-title">
            <h2>最新消息</h2>
            <div class="emoji-list">
                <img src="pic/momo_1.png" alt="表情1" class="emoji">
                <img src="pic/momo_2.png" alt="表情2" class="emoji">
                <img src="pic/momo_3.png" alt="表情3" class="emoji">
                <img src="pic/momo_4.png" alt="表情4" class="emoji">
            </div>
        </div>

        <!-- 消息列表 -->
        <div class="news-list" id="newsBox">

        </div>
    </div>
    <!-- 引用底部 -->
    <div id="footer-box"></div>
    <script>
        $("#footer-box").load("footer.html");
    </script>
    <!-- 引入右下角飘窗 -->
    <div id="float-container"></div>
    <script>
        // 使用 fetch 引入公共文件
        fetch('float.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('float-container').innerHTML = data;
            });
    </script>
    <script>
        // 页面加载就请求后台
        $(function(){
            $.get("/api/message/list",{type:0}, function(res){
                let html = "";
                res.data.records.forEach(item=>{
                    html += `<div class="news-item">
<div class="news-img"><img src="${item.imgUrl}" alt="${item.title}"></div>
<div class="news-content"><div onclick="goDetail(${item.id})">
<h3>${item.title}</h3><p class="news-desc">${item.slogan}</p></div><div class="news-date">${formatDate(item.publishTime)}</div></div>
</div>`;
                })
                $("#newsBox").html(html);
            })
        })
        // 跳转函数：拼接URL参数
        function goDetail(id) {
            // 跳转到 courseInfo.html，并携带 id 参数
            location.href = `newsDetail.html?id=${id}`;
        }
        // 时间格式化工具函数（与轮播图页面统一）
        function formatDate(dateStr) {
            if (!dateStr) return '无记录';
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    </script>
</body>

</html>
